<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Asistencia — INMU</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --blue-800: #0C447C; --blue-600: #185FA5; --blue-50: #E6F1FB;
    --green-600: #1D9E75; --green-50: #EAF3DE;
    --red-600: #E24B4A; --red-50: #FCEBEB;
    --gray-900: #2C2C2A; --gray-600: #5F5E5A; --gray-100: #D3D1C7; --gray-50: #F0F2F5;
    --amber-600: #BA7517;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background-color: var(--gray-50); color: var(--gray-900); padding-bottom: 50px; }

  .header { background-color: var(--blue-800); color: white; padding: 15px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
  .header-logo { width: 70px; height: 70px; object-fit: contain; background: white; border-radius: 50%; padding: 5px; }
  .header-titles { flex: 1; text-align: center; }
  .header h1 { font-size: 18px; margin-bottom: 2px; }
  
  .btn-group-nav { display: flex; gap: 8px; flex-direction: column; }
  .btn-nav { color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }

  .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
  .panel { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  
  .view-section { display: none; }
  .view-active { display: block; }

  .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
  label { font-weight: bold; font-size: 13px; color: var(--gray-600); display: block; margin-bottom: 5px; text-transform: uppercase; }
  select, input[type="text"] { width: 100%; padding: 10px; border: 1.5px solid var(--gray-100); border-radius: 6px; font-size: 14px; outline: none; }
  
  .student-list { margin-top: 15px; border: 1px solid var(--gray-100); border-radius: 8px; overflow: hidden; }
  .student-row { display: grid; grid-template-columns: 40px 2fr 1fr 1fr 1fr; gap: 10px; padding: 12px 15px; border-bottom: 1px solid var(--gray-100); align-items: center; transition: background 0.2s; }
  .student-row:last-child { border-bottom: none; }
  .student-row:hover { background-color: var(--blue-50); }
  .student-header { background-color: var(--blue-800); color: white; font-weight: bold; font-size: 13px; }
  
  .checkbox-wrapper { display: flex; justify-content: center; }
  input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green-600); }
  
  .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center; }
  .badge.m { background-color: var(--blue-50); color: var(--blue-800); border: 1px solid var(--blue-200); }
  .badge.f { background-color: #FDE8EF; color: #9D234C; border: 1px solid #FBCFE0; }

  .btn-generate { background-color: var(--green-600); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.2s; text-transform: uppercase; }
  .btn-generate:hover { background-color: #15805e; }
  .btn-generate:disabled { background-color: var(--gray-400); cursor: not-allowed; }

  .sub-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  .sub-table th { background: var(--gray-50); padding: 10px; border: 1px solid var(--gray-100); text-align: left; color: var(--blue-800); }
  .sub-table td { padding: 10px; border: 1px solid var(--gray-100); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }

  /* MODO SEGURO: OCULTAMOS EL PDF COMO LO TENÍAS ANTES */
  #pdf-container { display: none; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.jpg" alt="Logo INMU" class="header-logo" onerror="this.style.display='none'"> 
  <div class="header-titles">
    <h1>Sistema de Control de Asistencia</h1>
    <p>Instituto Nacional de Mercedes Umaña</p>
  </div>
  <div class="btn-group-nav">
    <button class="btn-nav" style="background:#BA7517" onclick="pedirPassword()">➕ Nuevo Alumno</button>
    <button class="btn-nav" style="background:var(--green-600)" onclick="cambiarVista('subdireccion')">📊 Sub-Dirección</button>
    <button class="btn-nav" style="background:var(--blue-600); display:none;" id="btn-volver-asist" onclick="cambiarVista('docente')">✍️ Pasar Lista</button>
  </div>
</div>

<div class="container">
  
  <div id="view-docente" class="view-section view-active">
    <div class="panel">
      <div class="filters">
        <div>
          <label>Grado</label>
          <select id="grado-select" onchange="cargarAlumnos()">
            <option value="">-- Seleccionar --</option>
            <option value="1° General">1° General</option>
            <option value="1° Adm. Contable">1° Adm. Contable</option>
            <option value="1° S. Eléctricos">1° S. Eléctricos</option>
            <option value="2° General">2° General</option>
            <option value="2° Adm. Contable">2° Adm. Contable</option>
            <option value="2° Sist. Eléctricos">2° Sist. Eléctricos</option>
            <option value="3° Adm. Contable">3° Adm. Contable</option>
            <option value="3° Sist. Eléctricos">3° Sist. Eléctricos</option>
          </select>
        </div>
        <div>
          <label>Sección</label>
          <select id="seccion-select" onchange="cargarAlumnos()">
            <option value="">-- Seleccionar --</option>
            <option value='"A"'>"A"</option>
            <option value='"B"'>"B"</option>
            <option value="Única">Única</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
        <label style="color: var(--blue-800); margin:0; font-size:16px;">Lista de Estudiantes</label>
        <button onclick="inicializarBaseDatos()" style="background:none; border:none; color:var(--blue-600); cursor:pointer; font-size:12px; font-weight:bold;">🔄 Sincronizar Nube</button>
      </div>
      <p style="font-size: 12px; color: var(--gray-600); margin-bottom: 10px;">Marque la casilla de los alumnos presentes.</p>
      <div class="student-list" id="tabla-alumnos">
        <div style="padding: 20px; text-align: center; color: var(--gray-600);">⏳ Conectando a la base de datos...</div>
      </div>
    </div>

    <div class="panel">
      <label>Nombre del Docente Responsable:</label>
      <input type="text" id="docente-nombre" placeholder="Ej. Lic. Emerson Castro" style="margin-bottom: 15px;">
      <label>Formato de la Hoja PDF:</label>
      <div style="display:flex; gap:20px; margin-bottom: 15px; font-size:14px;">
        <label style="text-transform:none; font-weight:normal;"><input type="radio" name="orientacion" value="portrait" checked> Vertical</label>
        <label style="text-transform:none; font-weight:normal;"><input type="radio" name="orientacion" value="landscape"> Horizontal</label>
      </div>
      <button class="btn-generate" id="btn-main-generate" onclick="generarPDF()">📄 Generar Hoja y Guardar Reporte</button>
    </div>
  </div>

  <div id="view-subdireccion" class="view-section">
    <div class="panel">
      <h2 style="color: var(--blue-800); margin-bottom: 10px;">Resumen (Sub-Dirección)</h2>
      <div id="sub-lista-reportes">
        <div style="padding: 20px; text-align: center;">Cargando reportes...</div>
      </div>
      <button onclick="cargarReportesSub()" style="width:100%; margin-top:15px; padding:12px; border-radius:8px; border:1px solid var(--blue-600); color:var(--blue-600); background:white; font-weight:bold; cursor:pointer;">🔄 Actualizar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-alumno">
  <div class="modal">
    <h3>Nuevo Estudiante</h3>
    <input type="text" id="new-nombre" placeholder="Apellidos, Nombres" style="width:100%; padding:10px; margin-bottom:10px;">
    <select id="new-sexo" style="width:100%; padding:10px; margin-bottom:10px;"><option value="M">Masculino (M)</option><option value="F">Femenino (F)</option></select>
    <input type="text" id="new-nie" placeholder="NIE" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="new-telefono" placeholder="Teléfono" style="width:100%; padding:10px; margin-bottom:15px;">
    <div style="display:flex; gap:10px;">
      <button onclick="cerrarModal()" style="flex:1; padding:10px;">Cancelar</button>
      <button onclick="guardarAlumno()" id="btn-save-cloud" style="flex:1; padding:10px; background:var(--blue-600); color:white; border:none; border-radius:6px;">Guardar</button>
    </div>
  </div>
</div>

<div id="pdf-container">
  <div id="pdf-content" style="padding: 40px; font-family: Arial, sans-serif; color: black; background: white; width: 100%; box-sizing: border-box;">
  </div>
</div>

<script>
// --- PEGA TU URL DE GOOGLE AQUÍ ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwL2huKwIXPI2xVLo1M_Z7rEaXa3Wdgx6boUFj0CiaSVyVwtOV8HxyShrnxMtzmp0qy/exec";

let baseDatosAlumnos = [];
let alumnosFiltrados = [];

function cambiarVista(vista) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
    if(vista === 'subdireccion') {
        document.getElementById('view-subdireccion').classList.add('view-active');
        document.getElementById('btn-volver-asist').style.display = 'block';
        cargarReportesSub();
    } else {
        document.getElementById('view-docente').classList.add('view-active');
        document.getElementById('btn-volver-asist').style.display = 'none';
    }
}

async function inicializarBaseDatos() {
  const cont = document.getElementById('tabla-alumnos');
  cont.innerHTML = '<div style="padding: 20px; text-align: center; color: #185FA5; font-weight:bold;">Sincronizando con la nube...</div>';
  try {
    const response = await fetch(SCRIPT_URL);
    baseDatosAlumnos = await response.json();
    baseDatosAlumnos.sort((a, b) => a.nombre.localeCompare(b.nombre));
    cargarAlumnos();
  } catch (error) {
    cont.innerHTML = '<div style="padding: 20px; text-align: center; color: red;">Error de conexión con Google Sheets.</div>';
  }
}
window.onload = inicializarBaseDatos;

async function cargarReportesSub() {
    const container = document.getElementById('sub-lista-reportes');
    container.innerHTML = "Sincronizando reportes...";
    try {
        const response = await fetch(SCRIPT_URL + "?tipo=reportes");
        const reportes = await response.json();
        if(!reportes || reportes.length === 0) { container.innerHTML = "No hay registros."; return; }
        let html = `<table class="sub-table"><tr><th>Fecha</th><th>Grado/Sec</th><th>Total Asist.</th></tr>`;
        reportes.reverse().slice(0, 15).forEach(r => {
            html += `<tr><td>${new Date(r.fecha).toLocaleDateString()}</td><td>${r.grado} ${r.seccion}</td><td style="font-weight:bold; color:green;">${r.presentes}</td></tr>`;
        });
        html += `</table>`;
        container.innerHTML = html;
    } catch (e) { container.innerHTML = "Error al cargar reportes."; }
}

function cargarAlumnos() {
  const grado = document.getElementById('grado-select').value;
  const seccion = document.getElementById('seccion-select').value;
  const contenedor = document.getElementById('tabla-alumnos');
  
  if (!grado || !seccion) {
    contenedor.innerHTML = '<div style="padding: 20px; text-align: center; color: #5F5E5A;">Seleccione un grado y una sección para ver los alumnos.</div>';
    alumnosFiltrados = [];
    return;
  }

  alumnosFiltrados = baseDatosAlumnos.filter(a => a.grado === grado && a.seccion === seccion);

  if (alumnosFiltrados.length === 0) {
    contenedor.innerHTML = '<div style="padding: 20px; text-align: center; color: #E24B4A;">No hay alumnos registrados en este grado y sección.</div>';
    return;
  }

  let html = `
    <div class="student-row student-header">
      <div class="checkbox-wrapper">✓</div>
      <div>Nombre del Estudiante</div>
      <div>Sexo</div>
      <div>NIE</div>
      <div>Teléfono</div>
    </div>
  `;

  alumnosFiltrados.forEach((alumno, index) => {
    html += `
      <div class="student-row">
        <div class="checkbox-wrapper">
          <input type="checkbox" id="chk-${index}" value="${index}" checked>
        </div>
        <div style="font-weight: 500; font-size:13px;">${alumno.nombre}</div>
        <div><span class="badge ${alumno.sexo.toLowerCase()}">${alumno.sexo}</span></div>
        <div style="font-size: 13px;">${alumno.nie}</div>
        <div style="font-size: 13px;">${alumno.telefono}</div>
      </div>
    `;
  });

  contenedor.innerHTML = html;
}

// --- FUNCIÓN PARA GENERAR EL PDF (MOTOR RESTAURADO) ---
async function generarPDF() {
  const docente = document.getElementById('docente-nombre').value.trim();
  const grado = document.getElementById('grado-select').value;
  const seccion = document.getElementById('seccion-select').value;
  const orientacion = document.querySelector('input[name="orientacion"]:checked').value;
  const btn = document.getElementById('btn-main-generate');

  if (!grado || !seccion) { alert("Por favor, seleccione un Grado y una Sección."); return; }
  if (alumnosFiltrados.length === 0) { alert("No hay alumnos para generar la lista."); return; }
  if (!docente) { alert("Introduzca el nombre del DOCENTE."); document.getElementById('docente-nombre').focus(); return; }

  btn.disabled = true;
  btn.innerText = "⏳ Generando PDF...";

  const presentes = [];
  const ausentes = [];
  let masc = 0, fem = 0;

  alumnosFiltrados.forEach((alumno, index) => {
    const isChecked = document.getElementById(`chk-${index}`).checked;
    if (isChecked) {
      presentes.push(alumno);
      if (alumno.sexo === 'M') masc++;
      if (alumno.sexo === 'F') fem++;
    } else {
      ausentes.push(alumno);
    }
  });

  const ahora = new Date();
  const fechaStr = ahora.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const horaStr = ahora.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

  // Guardar en la Nube de fondo (No afecta la descarga)
  fetch(SCRIPT_URL, { 
    method: 'POST', mode: 'no-cors',
    body: JSON.stringify({ tipo_post: "asistencia", fecha: ahora, grado: grado, seccion: seccion, docente: docente, presentes: presentes.length, ausentes: ausentes.length, m: masc, f: fem }) 
  });

  // RESTAURACIÓN DE TU HTML ORIGINAL PARA EL PDF (Con portada y tablas coloridas)
  const pdfHtml = `
    <div style="text-align: center; padding-top: 150px; padding-bottom: 200px;">
      <h1 style="color: #0C447C; font-size: 26px; margin-bottom: 10px; text-transform: uppercase;">Ministerio de Educación, Ciencia y Tecnología</h1>
      <h2 style="color: #2C2C2A; font-size: 22px; margin-bottom: 50px; text-transform: uppercase;">Instituto Nacional de Mercedes Umaña</h2>
      
      <div style="border: 2px solid #0C447C; padding: 40px; border-radius: 15px; background-color: #E6F1FB; width: 80%; margin: 0 auto;">
        <h3 style="font-size: 24px; color: #185FA5; margin-bottom: 30px; text-transform: uppercase; border-bottom: 2px solid #185FA5; padding-bottom: 10px;">Registro de Asistencia Diario</h3>
        
        <div style="text-align: left; padding-left: 20px;">
          <p style="font-size: 18px; margin: 15px 0; color: #2C2C2A;"><strong>Grado:</strong> ${grado}</p>
          <p style="font-size: 18px; margin: 15px 0; color: #2C2C2A;"><strong>Sección:</strong> ${seccion}</p>
          <p style="font-size: 18px; margin: 15px 0; color: #2C2C2A;"><strong>Docente Responsable:</strong> ${docente}</p>
          <p style="font-size: 18px; margin: 15px 0; color: #2C2C2A;"><strong>Fecha de Registro:</strong> ${fechaStr}</p>
        </div>
      </div>
    </div>

    <div class="html2pdf__page-break"></div>

    <div style="text-align: center; border-bottom: 3px solid #0C447C; padding-bottom: 15px; margin-bottom: 20px;">
      <h2 style="font-size: 18px; color: #0C447C; margin-bottom: 5px; text-transform: uppercase;">MINISTERIO DE EDUCACIÓN CIENCIA Y TECNOLOGÍA</h2>
      <h3 style="font-size: 16px; color: #2C2C2A; margin-bottom: 5px; text-transform: uppercase;">INSTITUTO NACIONAL DE MERCEDES UMAÑA</h3>
      <h4 style="font-size: 14px; color: #5F5E5A;">(REGISTRO DE ASISTENCIA DIARIO)</h4>
    </div>

    <div style="margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 14px;">
      <div>
        <p><strong>Grado:</strong> ${grado}</p>
        <p><strong>Sección:</strong> ${seccion}</p>
      </div>
      <div style="text-align: right;">
        <p><strong>Fecha:</strong> ${fechaStr}</p>
        <p><strong>Docente:</strong> ${docente}</p>
      </div>
    </div>

    <div style="background-color: #E6F1FB; border: 1px solid #B5D4F4; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
      <h4 style="color: #0C447C; margin-bottom: 5px;">Resumen de Asistencia</h4>
      <p style="font-size: 14px;">
        <strong>Total Asistencias: ${presentes.length}</strong> &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; 
        Masculinos (M): <strong>${masc}</strong> &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; 
        Femeninos (F): <strong>${fem}</strong>
      </p>
      <p style="font-size: 14px; margin-top: 5px;">Total Ausencias: ${ausentes.length}</p>
    </div>

    <h4 style="color: #1D9E75; border-bottom: 2px solid #1D9E75; padding-bottom: 5px; margin-bottom: 10px; font-size: 15px;">ESTUDIANTES PRESENTES</h4>
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 25px; font-size: 13px;">
      <colgroup><col style="width: 8%;"><col style="width: 45%;"><col style="width: 10%;"><col style="width: 17%;"><col style="width: 20%;"></colgroup>
      ${presentes.length > 0 ? presentes.map(a => `
        <tr>
          <td style="border: 1px solid #ddd; padding: 8px; text-align: center; background-color: #EAF3DE; color: #1D9E75; font-weight: bold; font-size: 16px;">✓</td>
          <td style="border: 1px solid #ddd; padding: 8px;">${a.nombre}</td>
          <td style="border: 1px solid #ddd; padding: 8px; text-align: center;">${a.sexo}</td>
          <td style="border: 1px solid #ddd; padding: 8px;">${a.nie}</td>
          <td style="border: 1px solid #ddd; padding: 8px;">${a.telefono}</td>
        </tr>
      `).join('') : `<tr><td colspan="5" style="border: 1px solid #ddd; padding: 8px; text-align: center;">No hay alumnos presentes</td></tr>`}
    </table>

    <h4 style="color: #E24B4A; border-bottom: 2px solid #E24B4A; padding-bottom: 5px; margin-bottom: 10px; font-size: 15px;">ESTUDIANTES AUSENTES</h4>
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px; font-size: 13px;">
      <colgroup><col style="width: 8%;"><col style="width: 45%;"><col style="width: 10%;"><col style="width: 17%;"><col style="width: 20%;"></colgroup>
      ${ausentes.length > 0 ? ausentes.map(a => `
        <tr>
          <td style="border: 1px solid #ddd; padding: 8px; text-align: center; background-color: #FCEBEB; color: #E24B4A; font-weight: bold; font-size: 16px;">✗</td>
          <td style="border: 1px solid #ddd; padding: 8px;">${a.nombre}</td>
          <td style="border: 1px solid #ddd; padding: 8px; text-align: center;">${a.sexo}</td>
          <td style="border: 1px solid #ddd; padding: 8px;">${a.nie}</td>
          <td style="border: 1px solid #ddd; padding: 8px;">${a.telefono}</td>
        </tr>
      `).join('') : `<tr><td colspan="5" style="border: 1px solid #ddd; padding: 8px; text-align: center;">No hay alumnos ausentes</td></tr>`}
    </table>

    <div style="text-align: center; font-size: 12px; color: #5F5E5A; border-top: 1px solid #ddd; padding-top: 15px;">
      <p>Reporte generado el <strong>${fechaStr}</strong> a las <strong>${horaStr}</strong></p>
    </div>
  `;

  // METODO ORIGINAL QUE TE FUNCIONABA
  const container = document.getElementById('pdf-content');
  container.innerHTML = pdfHtml;

  const secLimpia = seccion.replace(/"/g, ''); 
  const fechaArchivo = fechaStr.replace(/\//g, '-');
  const filename = `Asistencia de ${grado} ${secLimpia} - ${fechaArchivo} - ${docente}.pdf`;

  const opt = {
    margin:       10,
    filename:     filename,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: orientacion },
    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'], avoid: 'tr' }
  };

  try {
    window.scrollTo(0, 0);
    await html2pdf().set(opt).from(container).save();
  } catch (error) {
    alert("❌ Error al generar PDF.");
  } finally {
    btn.disabled = false;
    btn.innerText = "📄 Generar Hoja y Guardar Reporte";
  }
}

function pedirPassword() { if (prompt("Contraseña:") === "1234") document.getElementById('modal-alumno').classList.add('open'); }
function cerrarModal() { document.getElementById('modal-alumno').classList.remove('open'); }

async function guardarAlumno() {
  const b = document.getElementById('btn-save-cloud');
  const n = { 
    tipo_post: "alumno", grado: document.getElementById('grado-select').value,
    seccion: document.getElementById('seccion-select').value, nombre: document.getElementById('new-nombre').value,
    sexo: document.getElementById('new-sexo').value, nie: document.getElementById('new-nie').value,
    telefono: document.getElementById('new-telefono').value
  };
  if(!n.nombre || !n.grado) return alert("Faltan datos");
  b.disabled = true; b.innerText = "Subiendo...";
  try {
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(n) });
    alert("Guardado exitoso en la nube.");
    cerrarModal();
    setTimeout(inicializarBaseDatos, 1000); // Pequeña pausa para que Google Sheets procese
  } catch(e) { alert("Error al guardar"); }
  b.disabled = false; b.innerText = "Guardar";
}
</script>
