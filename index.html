<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Asistencia — INMU</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root {
    --blue-800: #0C447C; --blue-600: #185FA5; --blue-50: #E6F1FB;
    --green-600: #1D9E75; --green-50: #EAF3DE;
    --red-600: #E24B4A; --red-50: #FCEBEB;
    --gray-900: #2C2C2A; --gray-600: #5F5E5A; --gray-100: #D3D1C7; --gray-50: #F0F2F5;
    --amber-600: #BA7517;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background-color: var(--gray-50); color: var(--gray-900); padding-bottom: 50px; }

  /* HEADER */
  .header { background-color: var(--blue-800); color: white; padding: 15px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
  .header-logo { width: 70px; height: 70px; object-fit: contain; background: white; border-radius: 50%; padding: 5px; }
  .header-titles { flex: 1; text-align: center; }
  .header h1 { font-size: 18px; margin-bottom: 2px; }
  
  .btn-group-nav { display: flex; gap: 8px; flex-direction: column; }
  .btn-nav { color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }

  .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
  .panel { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  
  .view-section { display: none; }
  .view-active { display: block; }

  /* FORMULARIOS Y TABLAS */
  .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
  label { font-weight: bold; font-size: 12px; color: var(--gray-600); display: block; margin-bottom: 5px; text-transform: uppercase; }
  select, input[type="text"] { width: 100%; padding: 10px; border: 1.5px solid var(--gray-100); border-radius: 8px; font-size: 14px; outline: none; }
  
  .student-list { margin-top: 10px; border: 1px solid var(--gray-100); border-radius: 8px; overflow: hidden; }
  
  /* FILAS CLICKEABLES */
  .student-row { display: grid; grid-template-columns: 40px 2fr 1fr 1fr 1fr; gap: 10px; padding: 12px 15px; border-bottom: 1px solid var(--gray-100); align-items: center; cursor: pointer; transition: background 0.2s; }
  .student-row:hover { background-color: var(--blue-50); }
  .student-header { background-color: var(--blue-800); color: white; font-weight: bold; font-size: 12px; cursor: default; }
  .student-header:hover { background-color: var(--blue-800); }
  
  /* CHECKBOX MÁS GRANDE */
  .checkbox-wrapper { display: flex; justify-content: center; }
  input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--green-600); }
  
  .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-align: center; }
  .badge.m { background-color: var(--blue-50); color: var(--blue-800); }
  .badge.f { background-color: #FDE8EF; color: #9D234C; }

  .btn-action { font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid var(--gray-100); background: white; }
  
  .btn-generate { background-color: var(--green-600); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; margin-bottom: 10px;}
  .btn-generate:disabled { background-color: var(--gray-400); cursor: not-allowed; }

  .sub-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  .sub-table th, .sub-table td { padding: 10px; border: 1px solid var(--gray-100); text-align: left; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }

  /* CONTENEDOR PDF OCULTO */
  #pdf-container { display: none; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.jpg" alt="Logo INMU" class="header-logo" onerror="this.style.display='none'"> 
  <div class="header-titles">
    <h1>Sistema de Control de Asistencia</h1>
    <p>Instituto Nacional de Mercedes Umaña</p>
  </div>
  <div class="btn-group-nav">
    <button class="btn-nav" style="background:#BA7517" onclick="pedirPasswordNuevo()">➕ Nuevo Alumno</button>
    <button class="btn-nav" style="background:var(--green-600)" onclick="pedirPasswordSub()">📊 Sub-Dirección</button>
    <button class="btn-nav" style="background:var(--blue-600); display:none;" id="btn-volver-asist" onclick="cambiarVista('docente')">✍️ Pasar Lista</button>
  </div>
</div>

<div class="container">
  
  <div id="view-docente" class="view-section view-active">
    <div class="panel">
      <div class="filters">
        <div>
          <label>Grado</label>
          <select id="grado-select" onchange="cargarAlumnos()">
            <option value="">-- Seleccionar --</option>
            <option value="1° General">1° General</option>
            <option value="1° Adm. Contable">1° Adm. Contable</option>
            <option value="1° S. Eléctricos">1° S. Eléctricos</option>
            <option value="2° General">2° General</option>
            <option value="2° Adm. Contable">2° Adm. Contable</option>
            <option value="2° Sist. Eléctricos">2° Sist. Eléctricos</option>
            <option value="3° Adm. Contable">3° Adm. Contable</option>
            <option value="3° Sist. Eléctricos">3° Sist. Eléctricos</option>
          </select>
        </div>
        <div>
          <label>Sección</label>
          <select id="seccion-select" onchange="cargarAlumnos()">
            <option value="">-- Seleccionar --</option>
            <option value='"A"'>"A"</option>
            <option value='"B"'>"B"</option>
            <option value="Única">Única</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
        <label style="color: var(--blue-800); margin:0; font-size:16px;">Lista de Estudiantes</label>
        <div>
          <button class="btn-action" onclick="toggleTodos()">☑️ Marcar/Desmarcar Todos</button>
          <button onclick="inicializarBaseDatos()" style="background:none; border:none; color:var(--blue-600); cursor:pointer; font-size:12px; font-weight:bold; margin-left: 10px;">🔄 Nube</button>
        </div>
      </div>
      <div class="student-list" id="tabla-alumnos">
        <div style="padding: 20px; text-align: center; color: var(--gray-600);">⏳ Conectando a la base de datos...</div>
      </div>
    </div>

    <div class="panel">
      <label>Nombre del Docente Responsable:</label>
      <input type="text" id="docente-nombre" placeholder="Ej. Lic. Emerson Castro" style="margin-bottom: 15px;">
      
      <div style="background: var(--gray-50); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--gray-100);">
        <label style="color: var(--green-600);">Diseño Automático PDF (Con Marca de Agua)</label>
        <div style="display:flex; gap:20px; margin-bottom: 15px; font-size:14px;">
          <label style="text-transform:none; font-weight:normal;"><input type="radio" name="orientacion" value="portrait" checked> Vertical</label>
          <label style="text-transform:none; font-weight:normal;"><input type="radio" name="orientacion" value="landscape"> Horizontal</label>
        </div>
        <button class="btn-generate" id="btn-pdf-generate" onclick="generarPDF()">📥 Generar PDF y Guardar Reporte</button>
      </div>
    </div>
  </div>

  <div id="view-subdireccion" class="view-section">
    <div class="panel">
      <h2 style="color: var(--blue-800); margin-bottom: 10px;">Resumen (Sub-Dirección)</h2>
      
      <div id="sub-lista-reportes">
        <div style="padding: 20px; text-align: center;">Cargando reportes...</div>
      </div>
      <button onclick="cargarReportesSub()" style="width:100%; margin-top:15px; padding:12px; border-radius:8px; border:1px solid var(--blue-600); color:var(--blue-600); background:white; font-weight:bold; cursor:pointer;">🔄 Actualizar Lista</button>
      
      <div style="margin-top: 25px; border-top: 2px dashed var(--gray-100); padding-top: 15px;">
        <label style="color: var(--red-600); font-size: 14px;">⚠️ Zona de Peligro: Limpiar Registros de la Nube</label>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <select id="delete-rango" style="flex: 2; padding: 10px; border: 1.5px solid var(--red-600); color: var(--red-600); border-radius: 8px; font-weight: bold; outline: none;">
            <option value="hoy">Borrar reportes de HOY</option>
            <option value="all">Borrar TODO el historial</option>
          </select>
          <button id="btn-delete-reportes" onclick="borrarReportes()" style="flex: 1; background: var(--red-600); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">🗑️ Ejecutar Borrado</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-alumno">
  <div class="modal">
    <h3>Nuevo Estudiante</h3>
    <input type="text" id="new-nombre" placeholder="Apellidos, Nombres" style="width:100%; padding:10px; margin-bottom:10px;">
    <select id="new-sexo" style="width:100%; padding:10px; margin-bottom:10px;"><option value="M">Masculino (M)</option><option value="F">Femenino (F)</option></select>
    <input type="text" id="new-nie" placeholder="NIE" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="new-telefono" placeholder="Teléfono" style="width:100%; padding:10px; margin-bottom:15px;">
    <div style="display:flex; gap:10px;">
      <button onclick="cerrarModal()" style="flex:1; padding:10px;">Cancelar</button>
      <button onclick="guardarAlumno()" id="btn-save-cloud" style="flex:1; padding:10px; background:var(--blue-600); color:white; border:none; border-radius:6px;">Guardar</button>
    </div>
  </div>
</div>

<div id="pdf-container">
  <div id="pdf-content" style="padding: 40px; font-family: Arial, sans-serif; color: black; background: white; width: 100%; box-sizing: border-box; position: relative; min-height: 1000px;">
  </div>
</div>

<script>
// =================================================================
// 🔗 ¡IMPORTANTE! PEGA TU URL DE GOOGLE APPS SCRIPT AQUÍ ABAJO 🔗
// =================================================================
const SCRIPT_URL = "PEGAR_AQUI_TU_URL";

let baseDatosAlumnos = [];
let alumnosFiltrados = [];
let estadoSeleccion = true;

// --- SEGURIDAD Y VISTAS ---
function pedirPasswordSub() {
  if (prompt("Ingrese contraseña de Sub-Dirección:") === "1234") {
    cambiarVista('subdireccion');
  } else {
    alert("Contraseña incorrecta.");
  }
}

function pedirPasswordNuevo() { 
  if (prompt("Ingrese contraseña de Administrador:") === "1234") {
    document.getElementById('modal-alumno').classList.add('open');
  } else {
    alert("Contraseña incorrecta.");
  }
}

function cambiarVista(vista) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
    if(vista === 'subdireccion') {
        document.getElementById('view-subdireccion').classList.add('view-active');
        document.getElementById('btn-volver-asist').style.display = 'block';
        cargarReportesSub();
    } else {
        document.getElementById('view-docente').classList.add('view-active');
        document.getElementById('btn-volver-asist').style.display = 'none';
    }
}

// --- CONEXIÓN A LA NUBE ---
async function inicializarBaseDatos() {
  const cont = document.getElementById('tabla-alumnos');
  cont.innerHTML = '<div style="padding: 20px; text-align: center; color: #185FA5; font-weight:bold;">Sincronizando con la nube...</div>';
  try {
    const response = await fetch(SCRIPT_URL);
    if(!response.ok) throw new Error("Error de Red");
    baseDatosAlumnos = await response.json();
    baseDatosAlumnos.sort((a, b) => a.nombre.localeCompare(b.nombre));
    cargarAlumnos();
  } catch (error) {
    cont.innerHTML = '<div style="padding: 20px; text-align: center; color: red;">Error de conexión. Verifica la URL de Google Script.</div>';
  }
}
window.onload = inicializarBaseDatos;

// --- VISTA SUB-DIRECCIÓN CON TODAS LAS COLUMNAS ---
async function cargarReportesSub() {
    const container = document.getElementById('sub-lista-reportes');
    container.innerHTML = "Sincronizando reportes...";
    try {
        const response = await fetch(SCRIPT_URL + "?tipo=reportes");
        const reportes = await response.json();
        if(!reportes || reportes.length === 0) { container.innerHTML = "No hay registros."; return; }
        
        let html = `<table class="sub-table">
                      <tr style="background-color: var(--blue-800); color: white;">
                        <th>Fecha</th>
                        <th>Grado/Secc</th>
                        <th>Docente</th>
                        <th style="text-align:center;">M</th>
                        <th style="text-align:center;">F</th>
                        <th style="text-align:center;">Ausentes</th>
                        <th style="text-align:center;">Total Asist.</th>
                      </tr>`;
                      
        reportes.reverse().slice(0, 20).forEach(r => {
            const fechaFormateada = new Date(r.fecha).toLocaleDateString('es-ES');
            html += `<tr>
                        <td>${fechaFormateada}</td>
                        <td>${r.grado} ${r.seccion}</td>
                        <td style="font-size: 11px;">${r.docente}</td>
                        <td style="text-align:center;">${r.m || 0}</td>
                        <td style="text-align:center;">${r.f || 0}</td>
                        <td style="text-align:center; font-weight:bold; color:#E24B4A;">${r.ausentes || 0}</td>
                        <td style="text-align:center; font-weight:bold; color:#1D9E75;">${r.presentes || 0}</td>
                     </tr>`;
        });
        html += `</table>`;
        container.innerHTML = html;
    } catch (e) { container.innerHTML = "Error al cargar reportes."; }
}

// --- LÓGICA DE TABLA DE ALUMNOS ---
function cargarAlumnos() {
  const grado = document.getElementById('grado-select').value;
  const seccion = document.getElementById('seccion-select').value;
  const contenedor = document.getElementById('tabla-alumnos');
  
  if (!grado || !seccion) {
    contenedor.innerHTML = '<div style="padding: 20px; text-align: center; color: #5F5E5A;">Seleccione un grado y una sección.</div>';
    alumnosFiltrados = []; return;
  }
  alumnosFiltrados = baseDatosAlumnos.filter(a => a.grado === grado && a.seccion === seccion);
  if (alumnosFiltrados.length === 0) {
    contenedor.innerHTML = '<div style="padding: 20px; text-align: center; color: #E24B4A;">No hay alumnos en este grado.</div>'; return;
  }

  let html = `<div class="student-row student-header"><div class="checkbox-wrapper">✓</div><div>Nombre del Estudiante</div><div>Sexo</div><div>NIE</div><div>Teléfono</div></div>`;
  alumnosFiltrados.forEach((alumno, index) => {
    html += `
      <div class="student-row" onclick="toggleFila(event, ${index})">
        <div class="checkbox-wrapper">
          <input type="checkbox" id="chk-${index}" value="${index}" checked>
        </div>
        <div style="font-weight: 500; font-size:13px;">${alumno.nombre}</div>
        <div><span class="badge ${alumno.sexo.toLowerCase()}">${alumno.sexo}</span></div>
        <div style="font-size: 13px;">${alumno.nie}</div>
        <div style="font-size: 13px;">${alumno.telefono}</div>
      </div>`;
  });
  contenedor.innerHTML = html;
  estadoSeleccion = true; 
}

function toggleFila(event, index) {
  if(event.target.tagName.toLowerCase() === 'input') return; 
  const chk = document.getElementById(`chk-${index}`);
  chk.checked = !chk.checked;
}

function toggleTodos() {
  estadoSeleccion = !estadoSeleccion;
  alumnosFiltrados.forEach((a, i) => {
    document.getElementById(`chk-${i}`).checked = estadoSeleccion;
  });
}

// --- BORRAR REPORTES DESDE SUB-DIRECCIÓN ---
async function borrarReportes() {
  const rango = document.getElementById('delete-rango').value;
  let mensaje = rango === "hoy" ? "¿Estás seguro que deseas borrar todos los reportes generados HOY?" : "⚠️ PELIGRO EXTREMO: ¿Estás seguro que deseas borrar TODO EL HISTORIAL de reportes?";
  
  if(!confirm(mensaje + "\nEsta acción borrará los datos de tu Google Sheets y no se puede deshacer.")) return;

  const btn = document.getElementById('btn-delete-reportes');
  btn.disabled = true; btn.innerText = "⏳ Borrando...";

  const fechaHoy = new Date().toLocaleDateString('es-ES');

  try {
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo_post: "delete_reportes", rango: rango, fecha: fechaHoy }) });
    setTimeout(() => {
      alert("✅ Orden de borrado enviada a la nube.");
      cargarReportesSub();
      btn.disabled = false; btn.innerText = "🗑️ Ejecutar Borrado";
    }, 1500);
  } catch(e) { 
    alert("❌ Error de red al intentar borrar.");
    btn.disabled = false; btn.innerText = "🗑️ Ejecutar Borrado";
  }
}

// --- GENERADOR DE PDF ---
async function generarPDF() {
  const docente = document.getElementById('docente-nombre').value.trim();
  const grado = document.getElementById('grado-select').value;
  const seccion = document.getElementById('seccion-select').value;
  const orientacion = document.querySelector('input[name="orientacion"]:checked').value;
  const btn = document.getElementById('btn-pdf-generate');

  if (!grado || !seccion) { alert("Seleccione un Grado y Sección."); return; }
  if (alumnosFiltrados.length === 0) { alert("No hay alumnos."); return; }
  if (!docente) { alert("Introduzca el nombre del DOCENTE."); document.getElementById('docente-nombre').focus(); return; }

  btn.disabled = true; btn.innerText = "⏳ Generando PDF...";

  const presentes = []; const ausentes = []; let masc = 0, fem = 0;
  alumnosFiltrados.forEach((alumno, index) => {
    if (document.getElementById(`chk-${index}`).checked) {
      presentes.push(alumno); alumno.sexo === 'M' ? masc++ : fem++;
    } else { ausentes.push(alumno); }
  });

  const ahora = new Date();
  const fechaStr = ahora.toLocaleDateString('es-ES');
  const fechaArchivo = ahora.toLocaleDateString('es-ES').replace(/\//g, '-');
  const secLimpia = seccion.replace(/"/g, ''); 

  // Notificar a la nube
  fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo_post: "asistencia", fecha: ahora, grado: grado, seccion: seccion, docente: docente, presentes: presentes.length, ausentes: ausentes.length, m: masc, f: fem }) }).catch(e => console.log("Enviado"));

// --- GUARDAR NUEVO ALUMNO ---
function cerrarModal() { document.getElementById('modal-alumno').classList.remove('open'); }

async function guardarAlumno() {
  const b = document.getElementById('btn-save-cloud');
  const n = { 
    tipo_post: "alumno", grado: document.getElementById('grado-select').value,
    seccion: document.getElementById('seccion-select').value, nombre: document.getElementById('new-nombre').value,
    sexo: document.getElementById('new-sexo').value, nie: document.getElementById('new-nie').value,
    telefono: document.getElementById('new-telefono').value
  };
  if(!n.nombre || !n.grado) return alert("Faltan datos");
  
  b.disabled = true; b.innerText = "Subiendo...";
  try {
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(n) });
    alert("Guardado exitoso en la nube.");
    cerrarModal(); 
    setTimeout(inicializarBaseDatos, 1000);
  } catch(e) { alert("Error al guardar"); }
  b.disabled = false; b.innerText = "Guardar";
}
